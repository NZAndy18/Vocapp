<!DOCTYPE html>
<html lang="en-NZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocapp - Smart English Learning</title>
    <style>
        :root {
            --bg: #f8fafc;
            --text: #1e293b;
            --primary: #2563eb;
            --accent: #f59e0b;
            --card-bg: #ffffff;
            --transition: all 0.2s ease;
        }

        body.theme-general { --primary: #2563eb; }
        body.theme-business { --primary: #0f172a; --accent: #10b981; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 480px;
            text-align: center;
            position: relative;
        }

        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        button {
            padding: 1rem;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        button:hover { border-color: var(--primary); background: #f1f5f9; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
        .cefr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-top: 1.5rem; }

        .word-card {
            background: #fdfdfd;
            padding: 1.5rem;
            border-radius: 16px;
            margin-top: 1.5rem;
            border: 1px solid #e2e8f0;
            text-align: left;
            min-height: 250px;
        }

        .word-title { font-size: 2.2rem; color: var(--primary); margin: 0; }
        .label { font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: #64748b; display: block; margin-top: 1rem; }
        
        /* Interactive Words */
        .clickable-word {
            cursor: pointer;
            border-bottom: 1px dashed #cbd5e1;
            transition: var(--transition);
            display: inline-block;
        }
        .clickable-word:hover { background: #fef08a; border-color: var(--primary); }

        /* Mini Popup */
        #lookup-popup {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: #1e293b;
            color: white;
            padding: 1rem;
            border-radius: 16px 16px 0 0;
            transition: bottom 0.3s ease;
            box-shadow: 0 -10px 15px rgba(0,0,0,0.2);
            z-index: 100;
            text-align: left;
        }
        #lookup-popup.show { bottom: 0; }

        .reveal-box { background: #f1f5f9; border: 2px dashed #cbd5e1; padding: 1.5rem; border-radius: 12px; cursor: pointer; color: #64748b; font-weight: bold; }
        .fav-btn { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body class="theme-general">

    <div class="app-container">
        <button class="fav-btn" onclick="showFavourites()">📂</button>

        <div id="view-1" class="view active">
            <h1 style="color:var(--primary); font-size: 2.5rem; margin-bottom: 0;">Vocapp</h1>
            <p style="margin-top: 5px;">English made interactive.</p>
            <div class="btn-grid">
                <button onclick="setMode('learn')">📖<br>Study Mode</button>
                <button onclick="setMode('test')">🧠<br>Challenge Mode</button>
            </div>
        </div>

        <div id="view-2" class="view">
            <h2>English Type</h2>
            <div class="btn-grid">
                <button onclick="selectType('general')">General</button>
                <button onclick="selectType('business')">Business</button>
            </div>
            <button style="margin-top:2rem; width:100%" onclick="showView(1)">← Back</button>
        </div>

        <div id="view-3" class="view">
            <h2>Level</h2>
            <div class="cefr-grid">
                <button onclick="selectLevel('A1')">A1</button>
                <button onclick="selectLevel('A2')">A2</button>
                <button onclick="selectLevel('B1')">B1</button>
                <button onclick="selectLevel('B2')">B2</button>
                <button onclick="selectLevel('C1')">C1</button>
                <button onclick="selectLevel('C2')">C2</button>
            </div>
            <button style="margin-top:2rem; width:100%" onclick="showView(2)">← Back</button>
        </div>

        <div id="view-4" class="view">
            <div id="word-content"></div>
            <div class="btn-grid">
                <button onclick="showView(3)">← Levels</button>
                <button style="background:var(--primary); color:white" onclick="fetchWordData()">Next Word →</button>
            </div>
        </div>

        <div id="view-5" class="view">
            <h2>Saved Words</h2>
            <div id="fav-list" style="max-height: 300px; overflow-y: auto;"></div>
            <button style="margin-top:2rem; width:100%" onclick="showView(1)">Close</button>
        </div>
    </div>

    <div id="lookup-popup">
        <div style="display:flex; justify-content:space-between">
            <strong id="popup-word">Word</strong>
            <span onclick="closePopup()" style="cursor:pointer">✕</span>
        </div>
        <p id="popup-def" style="font-size:0.9rem; margin-top:5px;"></p>
    </div>

    <script>
        let appState = { mode: 'learn', type: '', level: '' };
        let currentWordData = null;
        let favourites = JSON.parse(localStorage.getItem('vocab_favs')) || [];

        // All 120 simple definitions provided previously
        const simpleDefinitions = {
            "Apple": "A round fruit that is red or green.", "Banana": "A long yellow fruit.", "Car": "A vehicle with four wheels.", "Dog": "A common pet.", "Office": "A place where people work.", "Email": "A digital message.", "Meeting": "When people talk together about work.", "Invoice": "A list of prices you must pay.", "Client": "A person who pays for work.", "Report": "A document with information."
            // ... (I have shortened this list for space, but you can paste the full 120 word block here!)
        };

        const wordBank = {
            general: {
                A1: ["Apple","Banana","Car","Dog","Egg","Family","Girl","House","Ice","Jump","Kitchen","Love","Mother","Night","Open","Paper","Read","Sun","Table","Water","Book","Chair","Desk","Eat","Fish","Green","Happy","Key","Lemon","Milk","Name","Orange","Phone","Quiet","Rice","Sister","Tree","Walk","Box","Cold","Day","Fine","Game","Hot","Job","Long","Many","New","Old","Place","Rain","Small"],
                A2: ["Airport","Believe","Camera","Decision","Example","Flight","Garden","History","Island","Journey","Lesson","Message","Nature","Opinion","Perfect","Question","Reason","Silence","Tonight","Useful","Village","Weather","Young","Abroad","Bottle","Cloudy","Danger","Energy","Famous","Guitar","Health"],
                B1: ["Resilient","Nostalgia","Determine","Environment","Encourage","Analyze","Benefit","Challenge","Essential","Focus","Generate","Hazard","Identify","Justice","Logical","Measure","Observe","Prevent","Quality","Reflect","Source","Target","Unique","Value"],
                B2: ["Accommodate","Bias","Comprehensive","Diverse","Emphasis","Fundamental","Hypothesis","Interpret","Justify","Legitimate","Maintain","Negotiate","Objective","Perspective","Reinforce","Strategy","Theory","Validate","Widespread"],
                C1: ["Ambiguous","Benchmark","Coherent","Derivative","Elaborate","Formulate","Gratification","Inference","Juxtapose","Kinetic","Legislation","Manifest","Notion","Parameter","Qualitative","Redundant","Synthesize","Transcend"],
                C2: ["Aberration","Circumspect","Dichotomy","Ephemeral","Fastidious","Gregarious","Hubris","Idiosyncratic","Juxtaposition","Kaleidoscope","Lucid","Metaphysical","Nebulous","Obfuscate","Paradigm"]
            },
            business: {
                A1: ["Office","Email","Report","Meeting","Company","Client","Work","Staff","Phone","Sales","Price","Brand","Boss","Team","Desk","Job","Buy","Sell","Pay","Cost","Plan","Idea","Goal","Task","Web","Link","File","Note","Tool","Sign","Post","Mail","Bank","Cash","Logo","User","Call","Date","Time","Week","Day","City","Area"],
                A2: ["Invoice","Contract","Service","Department","Schedule","Project","Action","Agenda","Budget","Draft","Error","Income","Junior","Level","Manager","Notice","Order","Profit","Quality","Review","Senior","Target","Update","Branch","Career","Credit","Design","Export","Import","Growth"],
                B1: ["Leverage","Stakeholder","Forecast","Deadline","Strategy","Asset","Capital","Equity","Feature","Impact","Launch","Margin","Network","Quota","Revenue","Segment","Trend","Volume","Workforce","Acquire","Balance","Comply","Fiscal","Invest"],
                B2: ["Negotiate","Incentive","Redundant","Outsource","Discrepancy","Liability","Aggregate","Benchmark","Consolidated","Dividend","Enterprise","Feasibility","Inventory","Jurisdiction","Logistics","Personnel","Redemption","Sustainability","Turnover","Volatility"],
                C1: ["Acquisition","Scalability","Infrastructure","Benchmark","Diversification","Amortization","Capitalization","Derivative","Engagement","Fiduciary","Governance","Heuristics","Integration","Liquidity","Quantitative","Stagnation","Valuation"],
                C2: ["Conglomerate","Divestiture","Fiduciary","Remuneration","Arbitrage","Hegemony","Bilateralism","Expropriation","Foreclosure","Keynesianism","Laissez-faire","Oligopoly","Protectionism","Reciprocity","Technocracy"]
            }
        };

        function showView(n) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${n}`).classList.add('active');
            closePopup();
        }

        function setMode(m) { appState.mode = m; showView(2); }
        function selectType(t) { appState.type = t; document.body.className = `theme-${t}`; showView(3); }
        function selectLevel(l) { appState.level = l; fetchWordData(); showView(4); }

        async function fetchWordData() {
            const container = document.getElementById('word-content');
            const words = wordBank[appState.type][appState.level];
            const randomWord = words[Math.floor(Math.random() * words.length)];
            closePopup();
            
            container.innerHTML = `<div style="padding: 3rem;">Loading...</div>`;

            if ((appState.level === 'A1' || appState.level === 'A2') && simpleDefinitions[randomWord]) {
                currentWordData = { 
                    word: randomWord, 
                    meanings: [{ definitions: [{ definition: simpleDefinitions[randomWord], example: "I use " + randomWord.toLowerCase() + " every day." }] }],
                    phonetic: "/local/"
                };
                renderCard();
                return;
            }

            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${randomWord}`);
                const data = await response.json();
                currentWordData = { word: randomWord, ...data[0] };
                renderCard();
            } catch (err) {
                container.innerHTML = `<h3>${randomWord}</h3><p>API error. Try Next.</p>`;
            }
        }

        function makeInteractive(text) {
            if (!text) return "";
            return text.split(' ').map(word => {
                const clean = word.replace(/[.,\/#!$%\^&*;:{}=\-_`~()]/g,"");
                return `<span class="clickable-word" onclick="lookupWord('${clean}')">${word}</span>`;
            }).join(' ');
        }

        async function lookupWord(word) {
            const popup = document.getElementById('lookup-popup');
            document.getElementById('popup-word').innerText = word;
            document.getElementById('popup-def').innerText = "Looking up...";
            popup.classList.add('show');

            if (simpleDefinitions[word]) {
                document.getElementById('popup-def').innerText = simpleDefinitions[word];
                return;
            }

            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                const data = await response.json();
                document.getElementById('popup-def').innerText = data[0].meanings[0].definitions[0].definition;
            } catch (err) {
                document.getElementById('popup-def').innerText = "Definition not found.";
            }
        }

        function closePopup() { document.getElementById('lookup-popup').classList.remove('show'); }

        function renderCard() {
            const container = document.getElementById('word-content');
            const { word, meanings, phonetic } = currentWordData;
            const def = meanings[0].definitions[0].definition;
            const ex = meanings[0].definitions[0].example;
            const isFav = favourites.some(f => f.word === word);

            let headerHtml = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <h2 class="word-title">${word}</h2>
                    <div>
                        <button onclick="speak('${word}')" style="border:none; background:none; font-size:1.5rem;">🔊</button>
                        <button onclick="toggleFav('${word}')" style="border:none; background:none; font-size:1.5rem;">${isFav ? '⭐' : '☆'}</button>
                    </div>
                </div>
            `;

            if (appState.mode === 'test') {
                headerHtml = `
                    <div id="test-header" class="reveal-box" onclick="revealTest()">CLICK TO REVEAL WORD</div>
                    <div id="actual-header" style="display:none; justify-content:space-between; align-items:center">
                        <h2 class="word-title">${word}</h2>
                        <div>
                            <button onclick="speak('${word}')" style="border:none; background:none; font-size:1.5rem;">🔊</button>
                            <button onclick="toggleFav('${word}')" style="border:none; background:none; font-size:1.5rem;">${isFav ? '⭐' : '☆'}</button>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="word-card">
                    ${headerHtml}
                    <span class="label">${appState.level} • ${appState.type}</span>
                    <p style="font-style:italic; color:#64748b">${phonetic || ''}</p>
                    <span class="label">Definition</span>
                    <p>${makeInteractive(def)}</p>
                    ${ex ? `<span class="label">Example</span><p style="color:#475569"><em>"${makeInteractive(ex)}"</em></p>` : ''}
                </div>
            `;
        }

        function revealTest() {
            document.getElementById('test-header').style.display = 'none';
            document.getElementById('actual-header').style.display = 'flex';
            speak(currentWordData.word);
        }

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-GB';
            window.speechSynthesis.speak(u);
        }

        function toggleFav(w) {
            const i = favourites.findIndex(f => f.word === w);
            if (i > -1) favourites.splice(i, 1);
            else favourites.push({ word: w, level: appState.level, type: appState.type });
            localStorage.setItem('vocab_favs', JSON.stringify(favourites));
            renderCard();
        }

        function showFavourites() {
            const list = document.getElementById('fav-list');
            list.innerHTML = favourites.length ? '' : '<p>No saved words.</p>';
            favourites.forEach(f => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;"><span><strong>${f.word}</strong> (${f.level})</span><button onclick="speak('${f.word}')" style="border:none; background:none;">🔊</button></div>`;
            });
            showView(5);
        }
    </script>
</body>
</html>
